// Return = (Value - Deposited) / Deposited — simple, accurate
function acctReturn(cat){
  const ac=S.accounts[cat]||{dep:0};
  const K=ks();if(!K.length)return{val:0,dep:0,gain:0,ret:0,tax:0,net:0};
  const lastM=S.months[K[K.length-1]]||{};
  const val=toD(lastM)[cat]||0;
  const dep=ac.dep||0;
  const gain=dep>0?val-dep:0;
  const rate=TXR[cat]||0;
  const tax=gain>0?gain*rate:0;
  return{val,dep,gain,ret:dep>0?(gain/dep*100):0,tax,net:val-tax};
}

    CH.push(new Chart($('c2'),{type:'doughnut',data:{labels:accts.map(c=>sh(c.name)),datasets:[{data:accts.map(c=>c.val),backgroundColor:accts.map(c=>c.color),borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{position:'right',rtl:true,labels:{padding:4,font:{size:7},usePointStyle:true}},tooltip:{callbacks:{label:c=>`${c.label}: ${fmt(c.parsed)}`},...tt}}}}));
    CH.push(new Chart($('c3'),{type:'bar',data:{labels:sorted.map(c=>sh(c.name)),datasets:[{data:sorted.map(c=>c.ret),backgroundColor:sorted.map(c=>c.ret>=0?(dk?'rgba(63,185,80,.6)':'rgba(26,127,55,.5)'):(dk?'rgba(248,81,73,.6)':'rgba(207,34,46,.5)')),borderRadius:3}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fp(c.parsed.x)},...tt}},scales:{x:{ticks:{callback:v=>v+'%'},grid:{color:gc}},y:{grid:{display:false},ticks:{font:{size:7}}}}}}));
  }
}

// ===== BIZ =====
function renderBiz(){
  const el=$('p-biz');const K=fK(curP);
  const pI=(S.incomes||[]).filter(i=>K.includes(i.month)),pE=(S.expenses||[]).filter(e=>K.includes(e.month));
  const tI=pI.reduce((s,i)=>s+i.amount,0),tE=pE.reduce((s,e)=>s+e.amount,0);
  const tRec=pE.filter(e=>{const c=EXC.find(x=>x.id===e.cat);return c&&c.rec}).reduce((s,e)=>{const c=EXC.find(x=>x.id===e.cat);return s+e.amount*(c.p||1)},0);
  const byCat={};pE.forEach(e=>{if(!byCat[e.cat])byCat[e.cat]={t:0,n:0};byCat[e.cat].t+=e.amount;byCat[e.cat].n++});

  el.innerHTML=`<div class="TF">${['1m','3m','ytd','1y','all'].map(p=>`<button class="B ${curP===p?'act':''}" onclick="curP='${p}';renderBiz()">${{'1m':'חודש','3m':'3 חוד\'','ytd':'YTD','1y':'שנה','all':'הכל'}[p]}</button>`).join('')}</div>
  <div class="E"><div class="ET">💵 הכנסה</div><div class="ES">כולל מע"מ → נכנס לעו"ש</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="biM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="biA" placeholder="0"></div><div class="FR"><label class="FL">סוג</label><select class="FI" id="biC">${INC.map(c=>`<option value="${c.id}">${c.n}</option>`).join('')}</select></div><div class="FR"><label class="FL">תיאור</label><input class="FI" id="biD" style="direction:rtl;text-align:right"></div></div><div class="FA"><button class="B Ba" onclick="addI()">+</button></div></div>
  <div class="E"><div class="ET">💸 הוצאה</div><div class="ES">✓=מוכרת. יורדת מעו"ש. פנסיה/השתלמות — רשום כאן בלבד.</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="beM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="beA" placeholder="0"></div><div class="FR"><label class="FL">קטגוריה</label><select class="FI" id="beC">${EXC.map(c=>`<option value="${c.id}">${c.n}${c.rec?' ✓':''}</option>`).join('')}</select></div><div class="FR"><label class="FL">תיאור</label><input class="FI" id="beD" style="direction:rtl;text-align:right"></div></div><div class="FA"><button class="B Ba" onclick="addE()">+</button></div></div>
  ${tI||tE?`<div class="CG"><div class="CD"><div class="CS" style="background:var(--gn)"></div><div class="CL">הכנסות</div><div class="CV">${fmt(tI)}</div></div><div class="CD"><div class="CS" style="background:var(--rd)"></div><div class="CL">הוצאות</div><div class="CV">${fmt(tE)}</div></div><div class="CD"><div class="CS" style="background:var(--bl)"></div><div class="CL">מוכר במס</div><div class="CV">${fmt(tRec)}</div></div><div class="CD"><div class="CS" style="background:var(--gn)"></div><div class="CL">נטו</div><div class="CV">${fmt(tI-tE)}</div></div></div>
  ${Object.keys(byCat).length?`<div class="TB"><div class="TT">הוצאות לפי קטגוריה</div><div class="TS"><table><thead><tr><th>קטגוריה</th><th>סכום</th><th>מוכר</th></tr></thead><tbody>${Object.entries(byCat).sort((a,b)=>b[1].t-a[1].t).map(([id,d])=>{const c=EXC.find(x=>x.id===id);return`<tr><td class="tn">${c?c.n:id}</td><td>${fmt(d.t)}</td><td>${c&&c.rec?'✓':'✗'}</td></tr>`}).join('')}</tbody></table></div></div>`:''}
  `:''}
  <div class="E"><div class="ET">הכנסות אחרונות</div><div class="LI" id="biL"></div></div>
  <div class="E"><div class="ET">הוצאות אחרונות</div><div class="LI" id="beL"></div></div>`;
  if(ks().length){$('biM').value=ks().slice(-1)[0];$('beM').value=ks().slice(-1)[0]}rIL();rEL();}
function addI(){const m=$('biM').value,a=+$('biA').value,c=$('biC').value,d=$('biD').value.trim();if(!m||!a)return;S.incomes.push({id:Date.now(),month:m,amount:a,cat:c,desc:d||'הכנסה'});if(S.months[m])S.months[m]['עובר ושב']=(S.months[m]['עובר ושב']||0)+a;save();$('biA').value='';$('biD').value='';renderBiz()}
function addE(){const m=$('beM').value,a=+$('beA').value,c=$('beC').value,d=$('beD').value.trim();if(!m||!a)return;S.expenses.push({id:Date.now(),month:m,amount:a,cat:c,desc:d||'הוצאה'});if(S.months[m])S.months[m]['עובר ושב']=(S.months[m]['עובר ושב']||0)-a;save();$('beA').value='';$('beD').value='';renderBiz()}
function delI(id){const i=S.incomes.find(x=>x.id===id);if(!i||!confirm('למחוק?'))return;if(S.months[i.month])S.months[i.month]['עובר ושב']-=i.amount;S.incomes=S.incomes.filter(x=>x.id!==id);save();renderBiz()}
function delE(id){const e=S.expenses.find(x=>x.id===id);if(!e||!confirm('למחוק?'))return;if(S.months[e.month])S.months[e.month]['עובר ושב']+=e.amount;S.expenses=S.expenses.filter(x=>x.id!==id);save();renderBiz()}
function rIL(){const el=$('biL');if(!el)return;el.innerHTML=[...S.incomes].sort((a,b)=>b.id-a.id).slice(0,30).map(i=>`<div class="LT"><span class="ld">${ms(i.month)}</span><span class="tg tg-b">${(INC.find(x=>x.id===i.cat)||{}).n||''}</span><span class="lt">${i.desc}</span><span class="lv up">${fmt(i.amount)}</span><button class="B Bd" onclick="delI(${i.id})" style="padding:0 2px;font-size:7px">✕</button></div>`).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}
function rEL(){const el=$('beL');if(!el)return;el.innerHTML=[...S.expenses].sort((a,b)=>b.id-a.id).slice(0,30).map(e=>{const c=EXC.find(x=>x.id===e.cat);return`<div class="LT"><span class="ld">${ms(e.month)}</span><span class="tg ${c&&c.rec?'tg-g':'tg-r'}">${c?c.n:''}</span><span class="lt">${e.desc}</span><span class="lv dn">${fmt(e.amount)}</span><button class="B Bd" onclick="delE(${e.id})" style="padding:0 2px;font-size:7px">✕</button></div>`}).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}

// ===== TAX =====
function renderTax(){
  const yr=new Date().getFullYear().toString();const yP=(S.taxPayments||[]).filter(p=>p.month&&p.month.startsWith(yr));
  const yI=(S.incomes||[]).filter(i=>i.month&&i.month.startsWith(yr));const yE=(S.expenses||[]).filter(e=>e.month&&e.month.startsWith(yr));
  const tI=yI.reduce((s,i)=>s+i.amount,0);const tRec=yE.filter(e=>{const c=EXC.find(x=>x.id===e.cat);return c&&c.rec}).reduce((s,e)=>{const c=EXC.find(x=>x.id===e.cat);return s+e.amount*(c.p||1)},0);
  const taxable=tI/(1+VAT)-tRec/(1+VAT);
  const vE=tI*VAT/(1+VAT)-yE.filter(e=>{const c=EXC.find(x=>x.id===e.cat);return c&&c.vat}).reduce((s,e)=>{const c=EXC.find(x=>x.id===e.cat);return s+(e.amount*(c.p||1))*VAT/(1+VAT)},0);
  const iE=calcIT(taxable),bE=Math.min(taxable,44020*12)*.1783;
  const vP=yP.filter(p=>p.type==='vat').reduce((s,p)=>s+p.amount,0);
  const iP=yP.filter(p=>p.type==='income_adv'||p.type==='income_annual').reduce((s,p)=>s+p.amount,0);
  const bP=yP.filter(p=>p.type==='bituach_leumi').reduce((s,p)=>s+p.amount,0);
  const bc=v=>v>0?'dn':'up',bt=v=>v>0?'חובה':'זכות';
  const el=$('p-tax');
  el.innerHTML=`<div class="E"><div class="ET">🧾 מעקב מס — ${yr}</div><div class="ES">שולם בפועל מול הערכה. חיובי=חובה, שלילי=זכות.</div></div>
  <div class="TX">
    <div class="TXC"><h4>🧾 מע"מ</h4><div class="TXR"><span>הערכה</span><span>${fmt(vE)}</span></div><div class="TXR"><span>שולם</span><span class="up">${fmt(vP)}</span></div><div class="TXR"><span>יתרה</span><span class="${bc(vE-vP)}">${fmt(vE-vP)} (${bt(vE-vP)})</span></div></div>
    <div class="TXC"><h4>📋 מס הכנסה</h4><div class="TXR"><span>הערכה</span><span>${fmt(iE)}</span></div><div class="TXR"><span>שולם</span><span class="up">${fmt(iP)}</span></div><div class="TXR"><span>יתרה</span><span class="${bc(iE-iP)}">${fmt(iE-iP)} (${bt(iE-iP)})</span></div></div>
    <div class="TXC"><h4>🏥 ביט"ל</h4><div class="TXR"><span>הערכה</span><span>${fmt(bE)}</span></div><div class="TXR"><span>שולם</span><span class="up">${fmt(bP)}</span></div><div class="TXR"><span>יתרה</span><span class="${bc(bE-bP)}">${fmt(bE-bP)} (${bt(bE-bP)})</span></div></div>
    <div class="TXC"><h4>📊 סיכום</h4><div class="TXR"><span>חובה</span><span>${fmt(vE+iE+bE)}</span></div><div class="TXR"><span>שולם</span><span class="up">${fmt(vP+iP+bP)}</span></div><div class="TXR"><span>יתרה</span><span class="${bc(vE+iE+bE-vP-iP-bP)}" style="font-size:12px">${fmt(vE+iE+bE-vP-iP-bP)}</span></div></div>
  </div>
  <div class="E"><div class="ET">+ תשלום מס</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="txM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סוג</label><select class="FI" id="txT">${TXT.map(t=>`<option value="${t.id}">${t.i} ${t.n}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="txA"></div></div><div class="FA"><button class="B Ba" onclick="addTX()">+</button></div></div>
  <div class="E"><div class="ET">תשלומים</div><div class="LI" id="txL"></div></div>`;
  if(ks().length)$('txM').value=ks().slice(-1)[0];rTXL();}
function addTX(){const m=$('txM').value,t=$('txT').value,a=+$('txA').value;if(!m||!a)return;S.taxPayments.push({id:Date.now(),month:m,type:t,amount:a});if(S.months[m])S.months[m]['עובר ושב']=(S.months[m]['עובר ושב']||0)-a;save();renderTax()}
function delTX(id){const p=S.taxPayments.find(x=>x.id===id);if(!p||!confirm('למחוק?'))return;if(S.months[p.month])S.months[p.month]['עובר ושב']+=p.amount;S.taxPayments=S.taxPayments.filter(x=>x.id!==id);save();renderTax()}
function rTXL(){const el=$('txL');if(!el)return;el.innerHTML=[...(S.taxPayments||[])].sort((a,b)=>(b.month||'').localeCompare(a.month||'')||b.id-a.id).slice(0,40).map(p=>{const t=TXT.find(x=>x.id===p.type);return`<div class="LT"><span class="ld">${ms(p.month)}</span><span class="tg tg-p">${t?t.n:p.type}</span><span class="lv dn">${fmt(p.amount)}</span><button class="B Bd" onclick="delTX(${p.id})" style="padding:0 2px;font-size:7px">✕</button></div>`}).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}

// ===== ENTRY =====
function renderEntry(){const K=ks();$('p-entry').innerHTML=`<div class="E"><div class="ET">✏️ יתרות</div><div class="ES">בחר חודש קיים או הוסף חדש</div><div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap"><select class="FI" id="eM" style="min-width:110px">${K.map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select><input type="month" class="FI" id="eN" style="min-width:110px;direction:ltr"><button class="B" onclick="addMo()">+ חודש</button></div><div class="FG" id="eF"></div><div class="FA"><button class="B Ba" onclick="svMo()">💾</button><button class="B Bd" onclick="dlMo()">🗑️</button><span class="SI" id="sv">✓</span></div></div>`;if(K.length){$('eM').value=K[K.length-1];ldM()}$('eM').onchange=ldM}
function ldM(){const k=$('eM').value;if(!k)return;const d=S.months[k]||{};$('eF').innerHTML=(S.cats||[]).map(c=>`<div class="FR"><label class="FL">${c}</label><input type="number" class="FI" data-c="${c}" value="${d[c]||''}" placeholder="0"></div>`).join('')}
function svMo(){const k=$('eM').value;if(!k)return;if(!S.months[k])S.months[k]={};document.querySelectorAll('#eF input[data-c]').forEach(i=>{S.months[k][i.dataset.c]=+i.value||0});save();$('sv').classList.add('sh');setTimeout(()=>$('sv').classList.remove('sh'),1500)}
function addMo(){let v=$('eN').value;if(!v){const K=ks();if(K.length){const[y,m]=K[K.length-1].split('-').map(Number);let nm=m+1,ny=y;if(nm>12){nm=1;ny++}v=ny+'-'+String(nm).padStart(2,'0')}else{const n=new Date();v=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}}if(S.months[v])return alert('קיים');S.months[v]={};save();renderEntry();$('eM').value=v;ldM()}
function dlMo(){const k=$('eM').value;if(!k||!confirm(`למחוק ${ml(k)}?`))return;delete S.months[k];S.incomes=(S.incomes||[]).filter(i=>i.month!==k);S.expenses=(S.expenses||[]).filter(e=>e.month!==k);S.transfers=(S.transfers||[]).filter(t=>t.month!==k);S.taxPayments=(S.taxPayments||[]).filter(p=>p.month!==k);save();renderEntry()}

// ===== ACCOUNTS =====
function renderAcct(){$('p-acct').innerHTML=`<div class="E"><div class="ET">🏦 חשבונות — סה"כ הופקד + דמ"נ</div><div class="ES">רווח = ערך נוכחי - הופקד. מס אוטומטי.</div><div class="TS"><table><thead><tr><th>חיסכון</th><th>הופקד ₪</th><th>דמ"נ הפקדה %</th><th>דמ"נ צבירה %</th></tr></thead><tbody>${dcs().filter(c=>c!=='עובר ושב').map(c=>{const a=S.accounts[c]||{};return`<tr><td class="tn">${sh(c)}</td><td><input type="number" class="FI" data-ac="${c}" data-f="dep" value="${a.dep||''}" style="width:90px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fd" value="${a.fd||''}" style="width:60px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fs" value="${a.fs||''}" style="width:60px"></td></tr>`}).join('')}</tbody></table></div><div class="FA"><button class="B Ba" onclick="svAc()">💾</button></div></div>
  <div class="E"><div class="ET">➕ חיסכון חדש</div><div style="display:flex;gap:4px"><input class="FI" id="ncI" placeholder="שם" style="direction:rtl;text-align:right;max-width:160px"><button class="B Ba" onclick="addCat()">+</button></div></div>`}
function svAc(){document.querySelectorAll('[data-ac]').forEach(i=>{const c=i.dataset.ac,f=i.dataset.f;if(!S.accounts[c])S.accounts[c]={dep:0,fd:0,fs:0};S.accounts[c][f]=+i.value||0});save()}
function addCat(){const n=$('ncI').value.trim();if(!n||(S.cats||[]).includes(n))return;S.cats.push(n);S.accounts[n]={dep:0,fd:0,fs:0};save();$('ncI').value='';renderAcct()}

// ===== TRANSFERS =====
function renderTr(){const cats=dcs().filter(c=>c!=='פיקדון אישי');$('p-transfer').innerHTML=`<div class="E"><div class="ET">🔄 העברה</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="tM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">מ</label><select class="FI" id="tF">${cats.map(c=>`<option value="${c}">${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">ל</label><select class="FI" id="tT">${cats.map((c,i)=>`<option value="${c}" ${i===4?'selected':''}>${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="tA"></div></div><div class="FA"><button class="B Ba" onclick="addTr()">+</button></div></div><div class="E"><div class="ET">היסטוריה</div><div class="LI" id="tL"></div></div>`;if(ks().length)$('tM').value=ks().slice(-1)[0];rTL()}
function addTr(){const m=$('tM').value,f=$('tF').value,t=$('tT').value,a=+$('tA').value;if(!m||!f||!t||f===t||!a)return;S.transfers.push({id:Date.now(),month:m,from:f,to:t,amount:a});if(S.months[m]){S.months[m][mb(f)]=(S.months[m][mb(f)]||0)-a;S.months[m][mb(t)]=(S.months[m][mb(t)]||0)+a}save();$('tA').value='';rTL()}
function delTr(id){const t=S.transfers.find(x=>x.id===id);if(!t||!confirm('למחוק?'))return;if(S.months[t.month]){S.months[t.month][mb(t.from)]+=t.amount;S.months[t.month][mb(t.to)]-=t.amount}S.transfers=S.transfers.filter(x=>x.id!==id);save();rTL()}
function rTL(){const el=$('tL');if(!el)return;el.innerHTML=[...(S.transfers||[])].sort((a,b)=>b.id-a.id).map(t=>`<div class="LT"><span class="ld">${ms(t.month)}</span><span class="lt">${sh(t.from)} → ${sh(t.to)}</span><span class="lv">${fmt(t.amount)}</span><button class="B Bd" onclick="delTr(${t.id})" style="padding:0 2px;font-size:7px">✕</button></div>`).join('')||'<p style="color:var(--c3);font-size:8px">אין</p>'}

// ===== SETTINGS =====
function renderSet(){$('p-set').innerHTML=`<div class="E"><div class="ET">ייצוא/ייבוא</div><div style="display:flex;gap:4px"><button class="B" onclick="let b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finboard_'+new Date().toISOString().slice(0,10)+'.json';a.click()">📤 ייצוא</button><button class="B" onclick="$('impI').click()">📥 ייבוא</button><input type="file" id="impI" accept=".json" style="display:none" onchange="let r=new FileReader();r.onload=e=>{try{S=JSON.parse(e.target.result);save()}catch(x){alert(x)}};r.readAsText(this.files[0])"></div></div>
  <div class="E"><div class="ET">⚠️ איפוס</div><button class="B Bd" onclick="$('rstM').classList.add('op')">מחק את כל הנתונים</button></div>`}

// ===== NAV =====
function togTh(){S.theme=document.body.dataset.theme==='dark'?'light':'dark';document.body.dataset.theme=S.theme;$('thB').textContent=S.theme==='dark'?'🌙':'☀️';save()}
const pages={dash:renderDash,biz:renderBiz,tax:renderTax,entry:renderEntry,acct:renderAcct,transfer:renderTr,set:renderSet};
document.querySelectorAll('.N button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.N button').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.P').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('p-'+b.dataset.t).classList.add('on');curT=b.dataset.t;pages[curT]()}});
</script>
