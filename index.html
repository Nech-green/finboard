    <script>

    // ===== FIREBASE INIT =====
    firebase.initializeApp({
      apiKey: "AIzaSyD6juU66Z90OOLKmWFC3eio_o1s9HyB1aU",
      authDomain: "finboard-nech.firebaseapp.com",
      projectId: "finboard-nech",
      storageBucket: "finboard-nech.firebasestorage.app",

    });

    const auth = firebase.auth();
    const db = firebase.firestore();
    let uid = null, unsubscribe = null;

    // חיבור והתנתקות
    function signIn(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()) }
    function signOut(){ auth.signOut() }
    function toggleAuth(){ uid ? signOut() : signIn() }

    auth.onAuthStateChanged(user => {
      if (user) {
        uid = user.uid;
        $('authBtn').textContent = 'התנתק';
        $('userInfo').textContent = user.displayName || user.email;
        $('syncDot').className = 'sync-dot sync-on';
        $('navBar').style.display = '';
        $('p-login').classList.remove('on');
        startSync();
      } else {
        uid = null;
        $('authBtn').textContent = 'התחבר';
        $('userInfo').textContent = '';
        $('syncDot').className = 'sync-dot sync-off';
        $('navBar').style.display = 'none';
        document.querySelectorAll('.P').forEach(p => p.classList.remove('on'));
        $('p-login').classList.add('on');
        if (unsubscribe) { unsubscribe(); unsubscribe = null; }
      }
    });

    function startSync() {
      if (unsubscribe) unsubscribe();
      const docRef = db.collection('users').doc(uid);
      unsubscribe = docRef.onSnapshot(snap => {
        if (snap.exists) {
          S = snap.data();
          renderCurrent();
        } else {
          S = defaultState();
          cloudSave();
        }
      });
    }

    async function cloudSave() {
      if (!uid) return;
      try {
        await db.collection('users').doc(uid).set(JSON.parse(JSON.stringify(S)));
        flashSync();
      } catch (e) { console.error('שגיאת שמירה:', e); }
    }

    function save() { cloudSave(); }

    function flashSync() {
        const dot = $('syncDot');

    const TX_R={'קרן כספית':.25,'פיקדון אישי':.25,'ביטוח ישיר - כללי':.25,'ביטוח ישיר - מניות':.25,'מיטב':.25,'מיטב טרייד':.25,'מנורה תגמולים':.25,'מנורה גמל':.25,'השתלמות':0,'פנסיה':0,'עובר ושב':0};

    function calcIT(a){let t=0,p=0;for(const b of BRK){const x=Math.min(a,b.u)-p;if(x<=0)break;t+=x*b.r;p=b.u}return t}

    const PL={'2026-01':{'עובר ושב':30116,'קרן כספית':41600,'פיקדון אישי':0,'ביטוח ישיר - כללי':77878,'ביטוח ישיר - מניות':157451,'מיטב':62886,'מיטב טרייד':197920,'מנורה מבטחים - תגמולים ופיצויים':58111,'מנורה מבטחים - גמל להשקעה':545,'הראל השתלמות':85880,'מנורה מבטחים השתלמות':8321,'פנסיה':61060},'2026-02':{'עובר ושב':33148,'קרן כספית':41683,'פיקדון אישי':0,'ביטוח ישיר - כללי':78800,'ביטוח ישיר - מניות':164583,'מיטב':62986,'מיטב טרייד':201250,'מנורה מבטחים - תגמולים ופיצויים':59761,'מנורה מבטחים - גמל להשקעה':553,'הראל השתלמות':85904,'מנורה מבטחים השתלמות':8165,'פנסיה':61494},'2026-03':{'עובר ושב':74342,'קרן כספית':41770,'פיקדון אישי':0,'ביטוח ישיר - כללי':79114,'ביטוח ישיר - מניות':170830,'מיטב':63792,'מיטב טרייד':195177,'מנורה מבטחים - תגמולים ופיצויים':60246,'מנורה מבטחים - גמל להשקעה':553,'הראל השתלמות':84305,'מנורה מבטחים השתלמות':8183,'פנסיה':61174}};

    function renderEntry(){const K=ks();$('p-entry').innerHTML=`<div class="E"><div class="ET">✏️ יתרות</div><div style="display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap"><select class="FI" id="eM" style="min-width:110px">${K.map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select><input type="month" class="FI" id="eN" style="min-width:110px;direction:ltr"><button class="B" onclick="addMo()">+ חודש</button></div><div class="FG" id="eF"></div><div class="FA"><button class="B Ba" onclick="svMo()">💾</button><button class="B Bd" onclick="dlMo()">🗑️</button><span class="SI" id="sv">✓</span></div></div>`;if(K.length){$('eM').value=K[K.length-1];ldM()}$('eM').onchange=ldM}
    function ldM(){const k=$('eM').value;if(!k)return;const d=S.months[k]||{};$('eF').innerHTML=(S.cats||[]).map(c=>`<div class="FR"><label class="FL">${c}</label><input type="number" class="FI" data-c="${c}" value="${d[c]||''}" placeholder="0"></div>`).join('')}
    function svMo(){const k=$('eM').value;if(!k)return;if(!S.months[k])S.months[k]={};document.querySelectorAll('#eF input[data-c]').forEach(i=>{S.months[k][i.dataset.c]=+i.value||0});save();$('sv').classList.add('sh');setTimeout(()=>$('sv').classList.remove('sh'),1500)}
    function addMo(){let v=$('eN').value;if(!v){const K=ks();if(K.length){const[y,m]=K[K.length-1].split('-').map(Number);let nm=m+1,ny=y;if(nm>12){nm=1;ny++}v=ny+'-'+String(nm).padStart(2,'0')}else{const n=new Date();v=n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')}}if(S.months[v])return alert('קיים');S.months[v]={};save();renderEntry();$('eM').value=v;ldM()}
    function dlMo(){const k=$('eM').value;if(!k||!confirm(`למחוק ${ml(k)}?`))return;delete S.months[k];S.incomes=S.incomes.filter(i=>i.month!==k);S.expenses=S.expenses.filter(e=>e.month!==k);S.transfers=S.transfers.filter(t=>t.month!==k);S.taxPayments=S.taxPayments.filter(p=>p.month!==k);save();renderEntry()}

    function renderAcct(){$('p-acct').innerHTML=`<div class="E"><div class="ET">🏦 חשבונות</div><div class="TS"><table><thead><tr><th>חיסכון</th><th>הופקד ₪</th><th>דמ"נ הפקדה %</th><th>דמ"נ צבירה %</th></tr></thead><tbody>${dispCats().filter(c=>c!=='עובר ושב').map(c=>{const a=S.accounts[c]||{};return`<tr><td class="tn">${sh(c)}</td><td><input type="number" class="FI" data-ac="${c}" data-f="dep" value="${a.dep||''}" style="width:90px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fd" value="${a.fd||''}" style="width:60px"></td><td><input type="number" step=".01" class="FI" data-ac="${c}" data-f="fs" value="${a.fs||''}" style="width:60px"></td></tr>`}).join('')}</tbody></table></div><div class="FA"><button class="B Ba" onclick="svAc()">💾</button></div></div><div class="E"><div class="ET">➕ חיסכון חדש</div><div style="display:flex;gap:4px"><input class="FI" id="ncI" placeholder="שם" style="direction:rtl;text-align:right;max-width:180px"><button class="B Ba" onclick="addCat()">+</button></div></div>`}
    function svAc(){document.querySelectorAll('[data-ac]').forEach(i=>{const c=i.dataset.ac,f=i.dataset.f;if(!S.accounts[c])S.accounts[c]={dep:0,fd:0,fs:0};S.accounts[c][f]=+i.value||0});save()}
    function addCat(){const n=$('ncI').value.trim();if(!n||S.cats.includes(n))return;S.cats.push(n);S.accounts[n]={dep:0,fd:0,fs:0};save();$('ncI').value='';renderAcct()}

    function renderTr(){const cats=dispCats().filter(c=>c!=='פיקדון אישי');$('p-transfer').innerHTML=`<div class="E"><div class="ET">🔄 העברה</div><div class="FG"><div class="FR"><label class="FL">חודש</label><select class="FI" id="tM">${ks().map(k=>`<option value="${k}">${ml(k)}</option>`).join('')}</select></div><div class="FR"><label class="FL">מ</label><select class="FI" id="tF">${cats.map(c=>`<option>${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">ל</label><select class="FI" id="tT">${cats.map((c,i)=>`<option ${i===4?'selected':''}>${sh(c)}</option>`).join('')}</select></div><div class="FR"><label class="FL">סכום</label><input type="number" class="FI" id="tA"></div></div><div class="FA"><button class="B Ba" onclick="addTr()">+</button></div></div><div class="E"><div class="ET">היסטוריה</div><div class="LI" id="tL"></div></div>`;if(ks().length)$('tM').value=ks().slice(-1)[0];rTL()}
    function addTr(){const m=$('tM').value,f=$('tF').value,t=$('tT').value,a=+$('tA').value;if(!m||!f||!t||f===t||!a)return;const fc=Object.entries(SHN).find(([,v])=>v===f)?.[0]||f;const tc=Object.entries(SHN).find(([,v])=>v===t)?.[0]||t;S.transfers.push({id:Date.now(),month:m,from:fc,to:tc,amount:a});if(S.months[m]){S.months[m][mb(fc)]=(S.months[m][mb(fc)]||0)-a;S.months[m][mb(tc)]=(S.months[m][mb(tc)]||0)+a}save();$('tA').value='';rTL()}
    function delTr(id){const t=S.transfers.find(x=>x.id===id);if(!t||!confirm('למחוק?'))return;if(S.months[t.month]){S.months[t.month][mb(t.from)]+=t.amount;S.months[t.month][mb(t.to)]-=t.amount}S.transfers=S.transfers.filter(x=>x.id!==id);save();rTL()}
    function rTL(){const el=$('tL');if(!el)return;el.innerHTML=[...S.transfers].sort((a,b)=>b.id-a.id).map(t=>`<div class="LT"><span class="ld">${ms(t.month)}</span><span class="lt">${sh(t.from)} → ${sh(t.to)}</span><span class="lv">${fmt(t.amount)}</span><button class="B Bd" onclick="delTr(${t.id})" style="padding:0 3px;font-size:7px">✕</button></div>`).join('')||'<p style="color:var(--c3);font-size:9px">אין</p>'}

    function renderSet(){$('p-set').innerHTML=`<div class="E"><div class="ET">הפקדות חודשיות</div><div class="FG">${Object.entries(S.salDeps||{}).map(([c,v])=>`<div class="FR"><label class="FL">${sh(c)}</label><input type="number" class="FI" data-sd="${c}" value="${v}"></div>`).join('')}</div><div class="FA"><button class="B Ba" onclick="document.querySelectorAll('[data-sd]').forEach(i=>S.salDeps[i.dataset.sd]=+i.value||0);save()">💾</button></div></div><div class="E"><div class="ET">ייצוא/ייבוא</div><div style="display:flex;gap:5px"><button class="B" onclick="let b=new Blob([JSON.stringify(S,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='finboard.json';a.click()">📤</button><button class="B" onclick="$('impI').click()">📥</button><input type="file" id="impI" accept=".json" style="display:none" onchange="let r=new FileReader();r.onload=e=>{try{S=JSON.parse(e.target.result);save()}catch(x){alert(x)}};r.readAsText(this.files[0])"></div></div>`}

    async function resetAll(){if(!uid)return;await db.collection('users').doc(uid).delete();S=defaultState();await cloudSave();$('rstM').classList.remove('op');renderCurrent()}
    function togTh(){S.theme=document.body.dataset.theme==='dark'?'light':'dark';document.body.dataset.theme=S.theme;$('thB').textContent=S.theme==='dark'?'🌙':'☀️';save()}

    const pages={dash:renderDash,biz:renderBiz,tax:renderTax,entry:renderEntry,acct:renderAcct,transfer:renderTr,set:renderSet};
    document.querySelectorAll('.N button').forEach(b=>{b.onclick=()=>{document.querySelectorAll('.N button').forEach(x=>x.classList.remove('on'));document.querySelectorAll('.P').forEach(x=>x.classList.remove('on'));b.classList.add('on');$('p-'+b.dataset.t).classList.add('on');curTab=b.dataset.t;pages[curTab]()}});
    </script>
</body>
</html>
